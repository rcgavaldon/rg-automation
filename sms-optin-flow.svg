<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <!-- Background -->
  <rect width="640" height="420" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="320" y="38" text-anchor="middle" fill="#f59e0b" font-size="17" font-weight="700">RG Automation — SMS Opt-In Flow</text>
  <text x="320" y="58" text-anchor="middle" fill="#64748b" font-size="11">Toll-Free Number: +1 (866) 827-6803</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="85" width="160" height="100" rx="10" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">STEP 1</text>
  <text x="110" y="135" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Customer Calls</text>
  <text x="110" y="153" text-anchor="middle" fill="#94a3b8" font-size="10">Dials Sofia AI-powered</text>
  <text x="110" y="167" text-anchor="middle" fill="#94a3b8" font-size="10">plumbing business</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="135" x2="228" y2="135" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="228,130 240,135 228,140" fill="#f59e0b"/>

  <!-- Step 2 -->
  <rect x="240" y="85" width="160" height="100" rx="10" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="320" y="115" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">STEP 2</text>
  <text x="320" y="135" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Verbal Consent</text>
  <text x="320" y="153" text-anchor="middle" fill="#94a3b8" font-size="10">Sofia discloses SMS</text>
  <text x="320" y="167" text-anchor="middle" fill="#94a3b8" font-size="10">opt-in before proceeding</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="135" x2="438" y2="135" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="438,130 450,135 438,140" fill="#f59e0b"/>

  <!-- Step 3 -->
  <rect x="450" y="85" width="160" height="100" rx="10" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="530" y="115" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">STEP 3</text>
  <text x="530" y="135" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Lead Captured</text>
  <text x="530" y="153" text-anchor="middle" fill="#94a3b8" font-size="10">Name, issue, address</text>
  <text x="530" y="167" text-anchor="middle" fill="#94a3b8" font-size="10">collected during call</text>

  <!-- Verbal disclosure box -->
  <rect x="30" y="215" width="580" height="68" rx="8" fill="#13131a" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="237" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">VERBAL OPT-IN DISCLOSURE (played at call start)</text>
  <text x="320" y="256" text-anchor="middle" fill="#f1f5f9" font-size="11" font-style="italic">"This call may be recorded. By continuing, you agree to receive a follow-up text message</text>
  <text x="320" y="272" text-anchor="middle" fill="#f1f5f9" font-size="11" font-style="italic">with your service details. Reply STOP at any time to opt out."</text>

  <!-- SMS example box -->
  <rect x="30" y="308" width="275" height="90" rx="8" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="167" y="330" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">SAMPLE SMS SENT AFTER CALL</text>
  <text x="167" y="349" text-anchor="middle" fill="#94a3b8" font-size="10">From: +1 (866) 827-6803</text>
  <text x="167" y="365" text-anchor="middle" fill="#f1f5f9" font-size="10">"Hi Maria, thanks for calling ABC Plumbing!</text>
  <text x="167" y="379" text-anchor="middle" fill="#f1f5f9" font-size="10">A tech will follow up shortly. Reply STOP</text>
  <text x="167" y="393" text-anchor="middle" fill="#f1f5f9" font-size="10">to opt out."</text>

  <!-- Opt-out box -->
  <rect x="335" y="308" width="275" height="90" rx="8" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="472" y="330" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">OPT-OUT INSTRUCTIONS</text>
  <text x="472" y="352" text-anchor="middle" fill="#94a3b8" font-size="11">Reply STOP — unsubscribe immediately</text>
  <text x="472" y="370" text-anchor="middle" fill="#94a3b8" font-size="11">Reply HELP — get support contact</text>
  <text x="472" y="388" text-anchor="middle" fill="#64748b" font-size="10">Msg &amp; data rates may apply. 1–4 msgs/request.</text>
</svg>
